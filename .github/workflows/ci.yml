name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install API dependencies
        run: npm ci

      - name: Install Flutter dependencies
        working-directory: client
        run: flutter pub get

      - name: Analyze
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
